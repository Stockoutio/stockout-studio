<!DOCTYPE html>
<html lang="en">
<head>

    <title>Stockout Studio</title>
    <meta name="description" content="Creative development and digital experiences.">
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for the X icon -->

</head>
<body>

    <nav>
        <div class="container nav-content">
            <div class="logo">STOCKOUT STUDIO</div>

        </div>

    <footer>
        <div class="container">
            <p>&copy; 2026 Stockout Studio | <a href="https://x.com/stockoutio" target="_blank" style="color: inherit; text-decoration: none;">@stockoutio</a></p>
