<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stockout Studio</title>
    <meta name="description" content="Creative development and digital experiences.">
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <nav>
        <div class="container nav-content">
            <div class="logo">STOCKOUT STUDIO</div>
            <div class="nav-links">
                <a href="#work">Work</a>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        
        <div class="container hero-content">
            <h1>Stockout <br><span style="background: var(--gradient-glow); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Studio.</span></h1>
            <p>Building immersive mechanics and digital experiences.</p>
        </div>
    </header>

    <section id="play" class="container">
        <div class="game-container">
            <div class="game-header">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <span>GRIDWING_DEMO.EXE</span>
            </div>
            <iframe src="https://itch.io/embed-upload/4489141?color=000000" allowfullscreen width="100%" height="600" style="border:0;">
                <a href="https://stockout.itch.io/gridwingdemo">Play Gridwing Demo on itch.io</a>
            </iframe>
            <div style="text-align: center; margin-top: 10px;">
                <a href="https://stockout.itch.io/gridwingdemo" target="_blank" style="color: var(--accent-secondary); font-size: 0.8rem; text-decoration: none; opacity: 0.7;">Unable to see the game? Play it directly on Itch.io →</a>
            </div>
        </div>
    </section>

    <section id="work" class="container">
        <div class="section-title">
            <h2>Featured Work</h2>
        </div>
        <div class="portfolio-grid">
            <div class="portfolio-item">
                <div style="width:100%; height:100%; background: #1e1e20;"></div>
                <div class="portfolio-info">
                    <h3>Gridwing</h3>
                    <p>High-octane space combat.</p>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2026 Stockout Studio.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
